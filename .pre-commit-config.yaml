repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: run tests
        entry: uv run pytest
        language: system
        pass_filenames: false

  - repo: local
    hooks:
      - id: security-check
        name: security scan
        entry: uv run pip-audit
        language: system
        pass_filenames: false
